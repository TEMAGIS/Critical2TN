<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#002868">
<meta name="referrer" content="no-referrer-when-downgrade">
<title>Critical2TN</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5; --surface: #ffffff; --surface2: #f7f8fa; --border: #e2e5ea;
    --text: #0f1117; --text2: #444c5c; --text3: #4f5665;
    --tema-blue: #002868; --tema-red: #BF0A30;
    --focus: #ffbf47;
    --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
    --radius: 14px; --radius-sm: 8px;
  }
  html, body { height: 100%; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  #app { display: flex; flex-direction: column; height: 100%; min-height: 100vh; max-width: 480px; margin: 0 auto; background: var(--bg); }
  /* App is hidden until the user is signed in */
  #app[hidden] { display: none !important; }

  /* ── Login screen ────────────────────────────────────────── */
  #login-screen {
    position: fixed; inset: 0; z-index: 5000;
    background: linear-gradient(165deg, var(--tema-blue) 0%, #00193f 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }
  #login-screen[hidden] { display: none; }
  .login-card {
    width: 100%; max-width: 420px;
    background: var(--surface); border-radius: 18px;
    padding: 28px 24px 22px; box-shadow: var(--shadow-lg);
  }
  .login-brand { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 18px; }
  .login-brand .tn-badge { width: 56px; height: 56px; }
  .login-title { font-size: 18px; font-weight: 700; color: var(--text); text-align: center; letter-spacing: -0.3px; }
  .login-sub   { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.4; max-width: 340px; }
  .login-form  { display: flex; flex-direction: column; gap: 12px; margin-top: 6px; }
  .login-form label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .login-form input {
    width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 16px; background: var(--surface2); color: var(--text);
    outline: none; transition: border-color 0.15s, background 0.15s;
  }
  .login-form input:focus { border-color: var(--tema-blue); background: var(--surface); box-shadow: 0 0 0 3px rgba(0,40,104,0.12); }
  .login-row { display: flex; flex-direction: column; gap: 6px; }
  .login-checkbox { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
  .login-checkbox input { width: auto; }
  .login-btn {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
    background: var(--tema-blue); color: white; font-size: 15px; font-weight: 700;
    font-family: 'DM Sans', sans-serif; cursor: pointer; min-height: 48px;
    transition: opacity 0.15s, transform 0.05s;
  }
  .login-btn:hover { opacity: 0.92; }
  .login-btn:active { transform: scale(0.99); }
  .login-btn:disabled { opacity: 0.55; cursor: wait; }
  .login-btn-oauth { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 6px; }
  .login-btn-oauth:hover { background: #003a8c; }
  .login-error {
    background: #fde8ea; border: 1px solid #f5c2c7; color: #842029;
    padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px;
    line-height: 1.4; display: none;
  }
  .login-error.visible { display: block; }
  .login-meta { font-size: 11px; color: var(--text3); text-align: center; margin-top: 14px; line-height: 1.5; }
  .login-meta a { color: var(--tema-blue); text-decoration: none; }
  .login-meta a:hover { text-decoration: underline; }
  :focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; border-radius: 4px; }
  .skip-link { position: absolute; top: -100px; left: 0; z-index: 9999; background: var(--focus); color: #000; font-weight: 700; font-size: 14px; padding: 10px 16px; border-radius: 0 0 8px 0; text-decoration: none; transition: top 0.2s; }
  .skip-link:focus { top: 0; }

  /* ── Header ──────────────────────────────────────────────── */
  #header { background: var(--tema-blue); padding: 12px 16px 10px; flex-shrink: 0; z-index: 100; padding-top: max(12px, env(safe-area-inset-top)); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
  .app-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .tn-badge { width: 38px; height: 38px; display: block; flex-shrink: 0; }
  .app-title-text { color: white; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-pills { display: flex; gap: 6px; flex-shrink: 0; }
  .header-pill {
    display: flex; align-items: center; gap: 5px; font-size: 12px; font-family: 'DM Mono', monospace;
    color: white; background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 20px; padding: 6px 11px; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    font-weight: 600; min-height: 36px;
  }
  .header-pill:hover { background: rgba(255,255,255,0.28); }
  .header-pill.icon-only { padding: 6px; aspect-ratio: 1; justify-content: center; }
  .search-wrap { position: relative; margin-bottom: 8px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  #search-input {
    width: 100%; padding: 10px 10px 10px 34px; border: 2px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 16px;
    background: var(--surface); color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search-input:focus { border-color: var(--focus); box-shadow: 0 0 0 3px rgba(255,191,71,0.35); }

  .filter-btn {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text2); border-radius: 20px; padding: 5px 11px;
    font-size: 12px; font-weight: 700; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; min-height: 32px;
  }
  .filter-btn:hover { border-color: var(--tema-blue); color: var(--tema-blue); }
  .filter-btn.has-filter { background: var(--tema-blue); border-color: var(--tema-blue); color: white; }
  .active-filters { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; padding: 0 16px 8px; }
  .active-filters:empty { display: none; }
  .active-chip {
    display: flex; align-items: center; gap: 3px;
    background: var(--tema-blue); color: white;
    border-radius: 12px; padding: 3px 8px; border: none;
    font-size: 11px; font-weight: 700; white-space: nowrap; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .active-chip-x { font-size: 13px; line-height: 1; opacity: 0.8; margin-left: 1px; }
  #filter-drawer {
    overflow: hidden; max-height: 0;
    transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
    background: var(--tema-blue);
    padding: 0 16px;
  }
  #filter-drawer.open { max-height: 320px; padding: 12px 16px 14px; }
  .fg-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
  @media (min-width: 480px) { .fg-row { grid-template-columns: repeat(5, 1fr); } }
  .fgt {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; user-select: none; opacity: 0.65; transition: opacity 0.15s, transform 0.15s;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.15);
    padding: 7px 4px; border-radius: 10px; color: white;
    font-family: 'DM Sans', sans-serif;
  }
  .fgt:hover { opacity: 0.95; background: rgba(255,255,255,0.12); }
  .fgt.active { opacity: 1; background: white; border-color: white; color: var(--tema-blue); transform: scale(1.02); }
  .fgt-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
  .fgt-icon svg { width: 100%; height: 100%; }
  .fgt-label { font-size: 10px; font-weight: 700; text-align: center; line-height: 1.15; }

  /* ── Map ─────────────────────────────────────────────────── */
  #map-container { flex-shrink: 0; height: 36vh; position: relative; }
  #map { width: 100%; height: 100%; }
  #fab-locate {
    position: absolute; bottom: 14px; right: 12px; width: 48px; height: 48px;
    background: var(--tema-blue); color: white; border: none; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,40,104,0.4);
    transition: transform 0.15s; z-index: 400;
  }
  #fab-locate:hover { transform: scale(1.08); }
  #fab-locate:active { transform: scale(0.95); }

  /* ── List ────────────────────────────────────────────────── */
  #list-section { flex: 1; overflow-y: auto; overscroll-behavior: contain; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .list-controls { position: sticky; top: 0; z-index: 10; background: var(--bg); box-shadow: 0 1px 0 rgba(0,0,0,0.04); }
  .list-header { padding: 10px 16px 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .list-count { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.6px; }
  #last-refreshed { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .stale-badge { display: inline-block; background: #fdeed3; color: #6b4200; border: 1px solid #d4920a; padding: 1px 6px; border-radius: 6px; font-size: 10px; font-weight: 700; margin-left: 4px; vertical-align: 2px; }
  .sort-toggle {
    font-size: 12px; color: var(--tema-blue); font-weight: 700; cursor: pointer;
    padding: 6px 10px; border-radius: 6px; border: none; background: none;
    min-height: 36px; display: flex; align-items: center;
  }
  #asset-list { display: flex; flex-direction: column; padding: 0 0 80px; }

  /* ── Card ────────────────────────────────────────────────── */
  .asset-card {
    background: var(--surface); margin: 0 12px 8px; border-radius: var(--radius);
    box-shadow: var(--shadow); border: 2px solid transparent; cursor: pointer; transition: all 0.2s; overflow: hidden;
  }
  .asset-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .asset-card:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; border-color: transparent; }
  .asset-card.selected { border-color: var(--tema-blue); box-shadow: 0 0 0 3px rgba(0,40,104,0.1), var(--shadow); }
  .card-body { display: flex; align-items: stretch; }
  .card-strip { width: 5px; flex-shrink: 0; }
  .card-content { flex: 1; padding: 13px 13px 10px; min-width: 0; }
  .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 5px; }
  .type-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: white; }
  .type-icon svg { width: 22px; height: 22px; }
  .card-titles { flex: 1; min-width: 0; }
  .card-name-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; flex: 1; min-width: 0; }
  .card-type-label { font-size: 12px; font-weight: 600; margin-top: 1px; }
  .card-asset-type { font-size: 11px; color: var(--text3); margin-top: 1px; font-style: italic; }
  .card-address { font-size: 12px; color: var(--text2); line-height: 1.4; margin-bottom: 0; }
  .dist-pill { font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 600; color: #003a8c; background: #dce6fb; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; white-space: nowrap; }
  .meta-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .meta-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; white-space: nowrap; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
  .meta-badge.region { background: #e8eef9; border-color: #b9c8e6; color: #1e3a6e; }
  .meta-badge.sector { background: #f0e9f7; border-color: #c9b8df; color: #5a3a85; }
  .card-footer { border-top: 1px solid var(--border); display: flex; }
  .card-action {
    flex: 1; padding: 12px 6px; display: flex; align-items: center; justify-content: center; gap: 4px;
    font-size: 12px; font-weight: 700; color: var(--text2); cursor: pointer; transition: background 0.15s, color 0.15s;
    text-decoration: none; border: none; background: none; font-family: 'DM Sans', sans-serif;
    min-height: 44px;
  }
  .card-action:hover { background: var(--surface2); color: var(--tema-blue); }
  .card-action + .card-action { border-left: 1px solid var(--border); }
  .card-action.primary { color: var(--tema-blue); }

  /* ── Empty / status ──────────────────────────────────────── */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }
  .offline-banner { background: #fdeed3; border-bottom: 1px solid #d4920a; color: #6b4200; padding: 8px 14px; font-size: 12px; text-align: center; font-weight: 600; }

  /* ── User marker ─────────────────────────────────────────── */
  .user-dot { width: 16px; height: 16px; background: var(--tema-blue); border-radius: 50%; border: 3px solid white; box-shadow: 0 0 0 3px rgba(0,40,104,0.3); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(0,40,104,0.3)} 50%{box-shadow:0 0 0 8px rgba(0,40,104,0.08)} }
  .leaflet-popup-content-wrapper { border-radius: var(--radius-sm) !important; box-shadow: var(--shadow-lg) !important; font-family: 'DM Sans',sans-serif !important; padding: 0 !important; }
  .leaflet-popup-content { margin: 0 !important; }
  .pop { padding: 11px 13px; min-width: 160px; }
  .pop-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; color: var(--text); }
  .pop-type { font-size: 11px; font-weight: 600; }

  /* ── Detail Sheet ────────────────────────────────────────── */
  #detail-sheet { position: fixed; inset: 0; z-index: 2000; pointer-events: none; }
  #detail-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); opacity: 0; transition: opacity 0.3s; }
  #detail-content {
    position: absolute; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 0 0 env(safe-area-inset-bottom,20px);
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 85vh; overflow-y: auto;
  }
  #detail-sheet.open { pointer-events: all; }
  #detail-sheet.open #detail-overlay { opacity: 1; }
  #detail-sheet.open #detail-content { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .sheet-close-btn {
    position: absolute; top: 12px; right: 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 50%; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; line-height: 1; color: var(--text2);
  }
  .sheet-banner { margin: 14px 20px 0; border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; color: white; }
  .sheet-banner svg { width: 24px; height: 24px; flex-shrink: 0; }
  .banner-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .banner-desc { font-size: 12px; margin-top: 2px; opacity: 0.95; line-height: 1.4; }
  .sheet-header { padding: 14px 20px 10px; }
  .sheet-name { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 3px; }
  .sheet-addr { font-size: 13px; color: var(--text2); line-height: 1.4; }
  .sheet-dist { font-size: 12px; font-family: 'DM Mono',monospace; font-weight: 700; margin-top: 5px; color: #003a8c; }
  .sdiv { height: 1px; background: var(--border); margin: 0 20px; }
  .sec { padding: 14px 20px; }
  .sec-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); margin-bottom: 8px; }
  .kv-grid { display: grid; grid-template-columns: max-content 1fr; gap: 6px 12px; font-size: 13px; }
  .kv-key { color: var(--text3); font-weight: 600; }
  .kv-val { color: var(--text); word-break: break-word; }
  a.kv-link { color: var(--tema-blue); text-decoration: none; font-weight: 600; }
  a.kv-link:hover { text-decoration: underline; }
  .attachment-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px; }
  .attachment-tile {
    aspect-ratio: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    overflow: hidden; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center;
    color: var(--text3); font-size: 11px;
  }
  .attachment-tile img { width: 100%; height: 100%; object-fit: cover; }
  .attachment-tile .fileinfo { padding: 6px; text-align: center; line-height: 1.3; }
  .attachment-tile.loading { background: linear-gradient(90deg, var(--surface2) 25%, #ececec 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .nav-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
  .nav-btn { padding: 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; font-family: 'DM Sans',sans-serif; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; transition: opacity 0.15s; min-height: 48px; }
  .nav-btn:hover { opacity: 0.88; }
  .nav-btn.goo { background: #1558d6; color: white; }
  .nav-btn.apl { background: #111; color: white; }

  /* ── Image lightbox ──────────────────────────────────────── */
  #lightbox {
    position: fixed; inset: 0; z-index: 5500; background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #lightbox[hidden] { display: none; }
  #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
  #lightbox .close {
    position: absolute; top: max(16px, env(safe-area-inset-top)); right: 16px;
    background: rgba(0,0,0,0.6); border: 1.5px solid white; color: white;
    border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
  }

  @keyframes loadbar { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
  @media(min-width:600px){ #app{ box-shadow: var(--shadow-lg); } }

  /* ── Desktop layout ──────────────────────────────────────── */
  @media (min-width: 900px) {
    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 420px 1fr;
      max-width: none; width: 100%; height: 100vh; min-height: 100vh; box-shadow: none;
    }
    #header        { grid-column: 1 / -1; grid-row: 1; }
    #list-section  { grid-column: 1; grid-row: 2; border-right: 1px solid var(--border); }
    #map-container { grid-column: 2; grid-row: 2; height: 100%; }
    #detail-content { left: 0; right: auto; bottom: 0; width: 420px; max-width: 420px; margin: 0; max-height: calc(100vh - 60px); }
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
</style>
</head>
<body>
<a class="skip-link" href="#asset-list">Skip to asset list</a>

<!-- ════════════════════════════════════════════════════════════
     LOGIN SCREEN
     Shown until a valid AGOL token is obtained. The Sign in
     button kicks off the OAuth 2.0 authorization-code (PKCE) flow.
     ════════════════════════════════════════════════════════════ -->
<div id="login-screen" role="dialog" aria-labelledby="login-title">
  <div class="login-card">
    <div class="login-brand">
      <svg class="tn-badge" viewBox="0 0 100 100" role="img" aria-label="Tennessee state logo">
        <rect x="0" y="0" width="100" height="84" fill="#D22730"/>
        <rect x="0" y="84" width="100" height="5" fill="#ffffff"/>
        <rect x="0" y="89" width="100" height="11" fill="#002868"/>
        <text x="50" y="70" text-anchor="middle" textLength="86" lengthAdjust="spacingAndGlyphs"
              font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="74"
              fill="#ffffff">TN</text>

// Helper — returns an <img> tag for the given lifeline key at any size.
// Used everywhere icons are rendered (cards, pills, markers, popups, sheet).
function iconHTML(key, size) {
  const url = ICON_URLS[key];
  if (!url) {
    // Fallback when the lifeline is unknown — neutral gray dot
    return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="#888" aria-hidden="true"><circle cx="12" cy="12" r="9"/></svg>`;
  }
  return `<img src="${url}" alt="" draggable="false" width="${size}" height="${size}" style="display:block;width:${size}px;height:${size}px;object-fit:contain">`;
}

// LIFELINES — metadata only (icon comes from ICON_URLS via iconHTML).
// Color is used for the card-strip, type-label text, and selected-marker ring.
const LIFELINES = {
  safety:   { label:'Safety & Security',   color:'#a8311f', desc:'Law enforcement, fire, search & rescue, government services, community safety.' },
  food:     { label:'Food, Hydration, Shelter', color:'#8a6500', desc:'Food, drinking water, shelter, and agriculture systems.' },
  health:   { label:'Health & Medical',    color:'#a83299', desc:'Hospitals, EMS, public health, medical supply chain, fatality management.' },
  energy:   { label:'Energy (Power & Fuel)', color:'#d35400', desc:'Power generation and distribution, fuel, energy systems.' },
  comms:    { label:'Communications',      color:'#7d3c98', desc:'Voice, internet, broadcasting, alerts & warnings, financial systems.' },
  trans:    { label:'Transportation',      color:'#404040', desc:'Highways, mass transit, aviation, maritime, rail, pipeline.' },
  hazmat:   { label:'Hazardous Materials', color:'#1e8449', desc:'Facilities, hazardous debris and pollutants, hazardous material.' },
  water:    { label:'Water Systems',       color:'#1f618d', desc:'Drinking water, wastewater systems, water infrastructure.' },
};

// Map raw lifeline string from the service into one of the 8 keys above.
// Substring match so variants like "Energy (Power & Fuel)" or
// "Food, Hydration, and Shelter" all land on the right key.
function normaliseLifeline(raw) {
  if (!raw) return null;
  const s = String(raw).toLowerCase();
  if (s.includes('safety') || s.includes('security'))            return 'safety';
  if (s.includes('food')   || s.includes('shelter') || s.includes('hydration')) return 'food';
  if (s.includes('health') || s.includes('medical'))             return 'health';
  if (s.includes('energy') || s.includes('power') || s.includes('fuel')) return 'energy';
  if (s.includes('commun') || s.includes('telecom'))             return 'comms';
  if (s.includes('transp') || s.includes('aviation') || s.includes('rail') || s.includes('highway')) return 'trans';
  if (s.includes('hazard') || s.includes('hazmat'))              return 'hazmat';
  if (s.includes('water')  || s.includes('wastewater'))          return 'water';
  return null; // unknown — shown under a neutral fallback
}

// ════════════════════════════════════════════════════════════════
//  AUTH — OAuth 2.0 with PKCE + silent refresh
//  --------------------------------------------------------------
//  Token shape (what we cache):
//    { accessToken, refreshToken, expiresAt, refreshExpiresAt, username }
//  expiresAt / refreshExpiresAt are absolute epoch ms so we can check
//  freshness without re-deriving from the AGOL response.
// ════════════════════════════════════════════════════════════════
let TOKEN = null;

// ── PKCE helpers ─────────────────────────────────────────────────
function _randomString(byteLen = 48) {
  const arr = new Uint8Array(byteLen);
  crypto.getRandomValues(arr);
  return _base64url(arr);
}
function _base64url(buf) {
  const bytes = buf instanceof Uint8Array ? buf : new Uint8Array(buf);
  let str = '';
  for (let i = 0; i < bytes.length; i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
async function _sha256base64url(s) {
  const buf  = new TextEncoder().encode(s);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return _base64url(new Uint8Array(hash));
}

// ── Token cache helpers ──────────────────────────────────────────
function loadStoredToken() {
  try {
    const raw = localStorage.getItem(CONFIG.tokenKey);
    if (!raw) return null;
    const t = JSON.parse(raw);
    if (!t.accessToken || !t.expiresAt) return null;
    return t;
  } catch { return null; }
}
function saveToken(t) {
  TOKEN = t;
  localStorage.setItem(CONFIG.tokenKey, JSON.stringify(t));
}
function clearStoredToken() {
  TOKEN = null;
  localStorage.removeItem(CONFIG.tokenKey);
  // Clear PKCE breadcrumbs too so a half-finished flow doesn't haunt us
  sessionStorage.removeItem('oauth_verifier');
  sessionStorage.removeItem('oauth_state');
}
function _tokenFromResponse(data) {
  // AGOL returns access_token, expires_in (seconds), refresh_token,
  // refresh_token_expires_in (seconds), username, ssl. expires_in can
  // arrive as a number OR a string depending on the org config.
  const now = Date.now();
  const expSec  = Number(data.expires_in) || 7200;
  const refSec  = Number(data.refresh_token_expires_in) || 0;
  return {
    accessToken:      data.access_token,
    refreshToken:     data.refresh_token || (TOKEN && TOKEN.refreshToken) || null,
    expiresAt:        now + expSec * 1000,
    refreshExpiresAt: refSec ? now + refSec * 1000 : (TOKEN && TOKEN.refreshExpiresAt) || null,
    username:         data.username || (TOKEN && TOKEN.username) || null,
  };
}

// ── OAuth flow: kick off the authorize redirect ──────────────────
async function startOAuthFlow() {
  try {
    const verifier  = _randomString(48);
    const challenge = await _sha256base64url(verifier);
    const state     = _randomString(16);
    sessionStorage.setItem('oauth_verifier', verifier);
    sessionStorage.setItem('oauth_state',    state);
    const params = new URLSearchParams({
      client_id:             CONFIG.clientId,
      response_type:         'code',
      redirect_uri:          CONFIG.redirectUri,
      code_challenge:        challenge,
      code_challenge_method: 'S256',
      expiration:            String(CONFIG.tokenExpirationMinutes),
      state,
    });
    window.location.href = `${CONFIG.authorizeUrl}?${params}`;
  } catch (err) {
    console.error('OAuth start failed:', err);
    setLoginError('Could not start sign-in. ' + (err.message || ''));
  }
}

// ── OAuth flow: exchange the authorization code for tokens ──────
async function exchangeCodeForToken(code) {
  const verifier = sessionStorage.getItem('oauth_verifier');
  if (!verifier) throw new Error('Missing PKCE verifier — please sign in again.');
  const params = new URLSearchParams({
    client_id:     CONFIG.clientId,
    grant_type:    'authorization_code',
    code,
    redirect_uri:  CONFIG.redirectUri,
    code_verifier: verifier,
    f:             'json',
  });
  const res  = await fetch(CONFIG.tokenUrl, { method: 'POST', body: params });
  const data = await res.json();
  if (data.error) {
    const msg = (data.error.details && data.error.details[0]) || data.error.message || 'Sign-in failed';
    throw new Error(msg);
  }
  if (!data.access_token) throw new Error('No access token returned');
  // Done with the verifier — clean up so it can't be replayed
  sessionStorage.removeItem('oauth_verifier');
  sessionStorage.removeItem('oauth_state');
  return _tokenFromResponse(data);
}

// ── Silent refresh ──────────────────────────────────────────────
async function refreshAccessToken() {
  if (!TOKEN || !TOKEN.refreshToken) throw new Error('No refresh token available');
  if (TOKEN.refreshExpiresAt && Date.now() > TOKEN.refreshExpiresAt) {
    throw new Error('Refresh token expired');
  }
  const params = new URLSearchParams({
    client_id:     CONFIG.clientId,
    grant_type:    'refresh_token',
    refresh_token: TOKEN.refreshToken,
    f:             'json',
  });
  const res  = await fetch(CONFIG.tokenUrl, { method: 'POST', body: params });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'Token refresh failed');
  if (!data.access_token) throw new Error('No access token in refresh response');
  return _tokenFromResponse(data);
}

// Ensure the in-memory access token is fresh; refresh it if it's near
// expiry. Throws if refresh fails — callers should fall back to login.
async function ensureFreshToken() {
  if (!TOKEN) throw new Error('Not signed in');
  if (TOKEN.expiresAt && Date.now() < TOKEN.expiresAt - CONFIG.refreshBufferMs) return;
  const fresh = await refreshAccessToken();
  saveToken(fresh);
}

// ════════════════════════════════════════════════════════════════
//  LOGIN UI
// ════════════════════════════════════════════════════════════════
const loginScreen = () => document.getElementById('login-screen');
const appShell    = () => document.getElementById('app');

function showLogin() {
  loginScreen().hidden = false;
  appShell().hidden = true;
  setTimeout(() => {
    const btn = document.getElementById('oauth-signin-btn');
    if (btn) btn.focus();
  }, 80);
}

function hideLogin() {
  loginScreen().hidden = true;
  appShell().hidden = false;
}

function setLoginError(msg) {
  const el = document.getElementById('login-error');
  if (!el) return;
  if (!msg) { el.classList.remove('visible'); el.textContent = ''; return; }
  el.classList.add('visible');
  el.textContent = msg;
}

function confirmLogout() {
  if (!confirm('Sign out and clear the cached session?')) return;
  clearStoredToken();
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  showLogin();
}

// Handle the OAuth redirect callback. Returns true if we consumed a
// `?code=...` from the URL, false if the page loaded normally.
async function handleOAuthCallback() {
  const url = new URL(window.location.href);
  const code = url.searchParams.get('code');
  const state = url.searchParams.get('state');
  const error = url.searchParams.get('error');
  if (error) {
    setLoginError(`Sign-in error: ${url.searchParams.get('error_description') || error}`);
    history.replaceState({}, '', url.pathname); // strip the error params
    return false;
  }
  if (!code) return false;
  // CSRF check — the state we sent must match what came back
  const expectedState = sessionStorage.getItem('oauth_state');
  if (expectedState && state !== expectedState) {
    setLoginError('Sign-in failed: state mismatch. Please try again.');
    history.replaceState({}, '', url.pathname);
    return false;
  }
  try {
    const tok = await exchangeCodeForToken(code);
    saveToken(tok);
    // Strip the code/state from the URL so a refresh doesn't try to reuse them
    history.replaceState({}, '', url.pathname);
    return true;
  } catch (err) {
    console.error('Token exchange failed:', err);
    setLoginError(err.message || 'Sign-in failed.');
    history.replaceState({}, '', url.pathname);
    return false;
  }
}

// ════════════════════════════════════════════════════════════════
//  DATA FETCHING
// ════════════════════════════════════════════════════════════════
function featureToAsset(feature) {
  const p   = feature.attributes;
  const lat = p[FIELDS.lat] ?? (feature.geometry ? feature.geometry.y : null);
  const lng = p[FIELDS.lng] ?? (feature.geometry ? feature.geometry.x : null);
  const lifelineKey = normaliseLifeline(p[FIELDS.lifeline]);
  return {
    objectId:    p[FIELDS.objectId],
    name:        p[FIELDS.name]         || 'Unnamed asset',
    hsipId:      p[FIELDS.hsipId]       || '',
    address:     p[FIELDS.address]      || '',
    city:        p[FIELDS.city]         || '',
    state:       p[FIELDS.state]        || 'TN',
    zip:         p[FIELDS.zip]          || '',
    county:      p[FIELDS.county]       || '',
    region:      p[FIELDS.region]       || '',
    assetType:   p[FIELDS.assetType]    || '',
    lifelineRaw: p[FIELDS.lifeline]     || '',
    lifeline:    lifelineKey,
    component:   p[FIELDS.component]    || '',
    subcomp:     p[FIELDS.subcomponent] || '',
    sector:      p[FIELDS.sector]       || '',
    contactName:   p[FIELDS.contactName]   || '',
    contactAgency: p[FIELDS.contactAgency] || '',
    contactPhone:  p[FIELDS.contactPhone]  || '',
    contactEmail:  p[FIELDS.contactEmail]  || '',
    lat, lng,
    distance:    null,
  };
}

async function arcgisFetch(url, _retried) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) {
    // 498 = invalid token, 499 = token required.
    // If we have a refresh token, try refreshing once and retry the call
    // before bouncing the user back to the login screen.
    if ((data.error.code === 498 || data.error.code === 499) && !_retried && TOKEN && TOKEN.refreshToken) {
      try {
        const fresh = await refreshAccessToken();
        saveToken(fresh);
        const newUrl = url.replace(/([?&]token=)[^&]+/, `$1${encodeURIComponent(fresh.accessToken)}`);
        return arcgisFetch(newUrl, true);
      } catch (e) {
        // Fall through to expired-token handling below
      }
    }
    if (data.error.code === 498 || data.error.code === 499) {
      const err = new Error('Token expired or invalid');
      err.tokenExpired = true;
      throw err;
    }
    throw new Error(`ArcGIS error ${data.error.code}: ${data.error.message}`);
  }
  return data;
}

async function fetchAssets() {
  if (!TOKEN) { showLogin(); return; }
  // Refresh proactively so background ticks don't fail with 498 first
  try { await ensureFreshToken(); }
  catch (err) {
    console.warn('Token refresh failed before fetch:', err);
    clearStoredToken();
    showLogin();
    return;
  }
  setLoadingState(true);
  const outFields = Object.values(FIELDS).join(',');
  const params = new URLSearchParams({
    where:          '1=1',
    outFields,
    returnGeometry: 'true',
    outSR:          '4326',
    f:              'json',
    token:          TOKEN.accessToken,
  });
  const url = `${CONFIG.serviceUrl}/query?${params}`;
  try {
    const data = await arcgisFetch(url);
    const raw = (data.features || []).map(featureToAsset)
                  .filter(a => Number.isFinite(a.lat) && Number.isFinite(a.lng));
    assets = raw.map((a, idx) => ({
      ...a,
      id: `a${idx}`,
      distance: (userLat !== null) ? haversine(userLat, userLng, a.lat, a.lng) : null,
    }));
    setLoadingState(false);
    setOfflineBanner(false);
    cacheData(assets);
    renderedList = getFiltered();
    document.getElementById('list-count').textContent = `${renderedList.length} asset${renderedList.length !== 1 ? 's' : ''}`;
    refreshMarkers();
    renderList();
    updateLastRefreshed(false);
  } catch (err) {
    console.error('Fetch failed:', err);
    setLoadingState(false);
    if (err.tokenExpired) {
      // Token died — push back to login, but keep last-known data on screen
      clearStoredToken();
      alert('Your session has expired. Please sign in again.');
      showLogin();
      return;
    }
    // Network error — fall back to cached data if any
    const cached = loadCachedData();
    if (cached && cached.assets && cached.assets.length) {
      assets = cached.assets.map(a => ({
        ...a,
        distance: (userLat !== null) ? haversine(userLat, userLng, a.lat, a.lng) : a.distance,
      }));
      renderedList = getFiltered();
      document.getElementById('list-count').textContent = `${renderedList.length} asset${renderedList.length !== 1 ? 's' : ''}`;
      refreshMarkers();
      renderList();
      updateLastRefreshed(true, cached.ts);
      setOfflineBanner(true);
    } else {
      showError(`Could not load assets.<br><small>${err.message}</small>`);
    }
  }
}

// ── Attachments ─────────────────────────────────────────────────
// Layer capability flag — set the first time fetchLayerMeta() runs.
// `null` means "haven't checked yet"; `true`/`false` is the answer.
let LAYER_HAS_ATTACHMENTS = null;
let LAYER_META_ERROR = null;

async function fetchLayerMeta() {
  if (LAYER_HAS_ATTACHMENTS !== null) return;
  if (!TOKEN) return;
  const url = `${CONFIG.serviceUrl}?f=json&token=${encodeURIComponent(TOKEN.accessToken)}`;
  try {
    const data = await arcgisFetch(url);
    LAYER_HAS_ATTACHMENTS = data.hasAttachments === true;
    console.info('[Critical2TN] layer hasAttachments =', LAYER_HAS_ATTACHMENTS);
  } catch (err) {
    LAYER_META_ERROR = err.message || String(err);
    console.warn('[Critical2TN] failed to read layer metadata:', err);
  }
}

async function fetchAttachmentInfo(objectId) {
  if (!TOKEN) return { state: 'error', message: 'Not signed in', infos: [] };
  // Make sure the access token is fresh — cheap if it's already valid
  try { await ensureFreshToken(); }
  catch (err) { return { state: 'error', message: 'Session expired — sign in again', infos: [] }; }
  if (LAYER_HAS_ATTACHMENTS === false) {
    return { state: 'unsupported', message: 'Attachments are not enabled on this layer.', infos: [] };
  }
  const url = `${CONFIG.serviceUrl}/${objectId}/attachments?f=json&token=${encodeURIComponent(TOKEN.accessToken)}`;
  try {
    const data = await arcgisFetch(url);
    const infos = (data.attachmentInfos || []).map(a => ({
      id:           a.id,
      name:         a.name,
      contentType:  a.contentType,
      size:         a.size,
      url:          `${CONFIG.serviceUrl}/${objectId}/attachments/${a.id}?token=${encodeURIComponent(TOKEN.accessToken)}`,
      isImage:      (a.contentType || '').startsWith('image/'),
    }));
    return { state: 'ok', infos };
  } catch (err) {
    console.warn('[Critical2TN] attachments fetch failed:', err);
    return { state: 'error', message: err.message || 'Could not load attachments.', infos: [] };
  }
}

// ── Cache (offline support) ─────────────────────────────────────
function cacheData(list) {
  try {
    const payload = { ts: Date.now(), assets: list };
    localStorage.setItem(CONFIG.cacheKey, JSON.stringify(payload));
  } catch (e) { /* quota — ignore */ }
}
function loadCachedData() {
  try {
    const raw = localStorage.getItem(CONFIG.cacheKey);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// ── Status helpers ──────────────────────────────────────────────
function setLoadingState(loading) {
  document.getElementById('loading-bar').style.display = loading ? 'block' : 'none';
  if (loading && assets.length === 0) document.getElementById('list-count').textContent = 'Loading…';
}
function updateLastRefreshed(stale, ts) {
  const when = stale && ts ? new Date(ts) : new Date();
  const t = when.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  document.getElementById('last-refreshed').innerHTML = `Updated ${t}${stale ? ' <span class="stale-badge">CACHED</span>' : ''}`;
}
function setOfflineBanner(on) {
  document.getElementById('offline-banner').hidden = !on;
}
function showError(msg) {
  document.getElementById('asset-list').innerHTML =
    `<div class="empty-state"><div class="icon">⚠️</div><p>${msg}</p>
     <button onclick="fetchAssets()" style="margin-top:14px;padding:10px 20px;background:var(--tema-blue);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Retry</button></div>`;
}

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let map, userMarker, userLat = null, userLng = null;
let markers = {}, assets = [];
let activeFilter = 'all', searchTerm = '', selectedId = null, sortByDistance = true;
let renderedList = [];
let refreshTimer = null;

function getAsset(id) { return assets.find(a => String(a.id) === String(id)); }

// ════════════════════════════════════════════════════════════════
//  FILTER GRID — 8 lifelines + "All"
// ════════════════════════════════════════════════════════════════
function buildFilterGrid() {
  const allBtn = `
    <button class="fgt active" data-key="all" aria-pressed="true" onclick="setFilter(this,'all')">
      <div class="fgt-icon" aria-hidden="true"><svg viewBox="0 0 26 26" width="26" height="26" aria-hidden="true"><circle cx="13" cy="13" r="12" fill="#002868"/><circle cx="13" cy="13" r="6" fill="#fff"/></svg></div>
      <div class="fgt-label">All</div>
    </button>`;
  const others = Object.entries(LIFELINES).map(([key, ll]) => `
    <button class="fgt" data-key="${key}" aria-pressed="false" onclick="setFilter(this,'${key}')" aria-label="Filter: ${ll.label}">
      <div class="fgt-icon" aria-hidden="true">${iconHTML(key, 26)}</div>
      <div class="fgt-label">${ll.label.replace(/&amp;/g,'&').split(',')[0].split(' & ')[0].replace('Hazardous Materials','HazMat').replace('Transportation','Transport')}</div>
    </button>`).join('');
  document.getElementById('filter-grid').innerHTML = `<div class="fg-row" role="group" aria-label="Filter by community lifeline">${allBtn}${others}</div>`;
}

function toggleFilterDrawer(forceClose = false) {
  const drawer = document.getElementById('filter-drawer');
  const btn    = document.getElementById('filter-toggle-btn');
  const isOpen = drawer.classList.contains('open');
  if (forceClose || isOpen) {
    drawer.classList.remove('open');
    drawer.setAttribute('aria-hidden', 'true');
    drawer.setAttribute('inert', '');
    btn.setAttribute('aria-expanded', 'false');
  } else {
    drawer.classList.add('open');
    drawer.setAttribute('aria-hidden', 'false');
    drawer.removeAttribute('inert');
    btn.setAttribute('aria-expanded', 'true');
  }
}

function setFilter(el, key) {
  document.querySelectorAll('.fgt').forEach(c => { c.classList.remove('active'); c.setAttribute('aria-pressed', 'false'); });
  el.classList.add('active'); el.setAttribute('aria-pressed', 'true');
  activeFilter = key;
  updateActiveFilterBar();
  renderList();
  if (key !== 'all') toggleFilterDrawer(true);
}

function clearTypeFilter() {
  const allBtn = document.querySelector('.fgt[data-key="all"]');
  document.querySelectorAll('.fgt').forEach(c => { c.classList.remove('active'); c.setAttribute('aria-pressed', 'false'); });
  if (allBtn) { allBtn.classList.add('active'); allBtn.setAttribute('aria-pressed', 'true'); }
  activeFilter = 'all';
  updateActiveFilterBar();
  renderList();
}

function updateActiveFilterBar() {
  const bar = document.getElementById('active-filters');
  const btn = document.getElementById('filter-toggle-btn');
  const chips = [];
  if (activeFilter !== 'all' && LIFELINES[activeFilter]) chips.push({ kind: 'type', label: LIFELINES[activeFilter].label });
  bar.innerHTML = chips.map(c =>
    `<button class="active-chip" type="button" data-clear="${c.kind}" aria-label="Remove filter: ${c.label}">${c.label}<span class="active-chip-x" aria-hidden="true">×</span></button>`
  ).join('');
  if (!bar._bound) {
    bar._bound = true;
    bar.addEventListener('click', (e) => {
      const chip = e.target.closest('.active-chip[data-clear]');
      if (!chip) return;
      if (chip.getAttribute('data-clear') === 'type') clearTypeFilter();
    });
  }
  btn.classList.toggle('has-filter', chips.length > 0);
}

function onSearch() { searchTerm = document.getElementById('search-input').value.toLowerCase(); renderList(); }
function toggleSort() {
  sortByDistance = !sortByDistance;
  document.getElementById('sort-label').textContent = sortByDistance ? '📍 Nearest first' : '🔤 A–Z';
  renderList();
}

function getFiltered() {
  let list = assets.filter(a => {
    if (activeFilter !== 'all' && a.lifeline !== activeFilter) return false;
    if (searchTerm) {
      const h = `${a.name} ${a.city} ${a.county} ${a.address} ${a.assetType} ${a.sector} ${a.region}`.toLowerCase();
      if (!h.includes(searchTerm)) return false;
    }
    return true;
  });
  if (sortByDistance && userLat !== null) list.sort((a, b) => (a.distance ?? Infinity) - (b.distance ?? Infinity));
  else list.sort((a, b) => a.name.localeCompare(b.name));
  return list;
}

// ════════════════════════════════════════════════════════════════
//  LIST RENDERING
// ════════════════════════════════════════════════════════════════
function renderList() {
  renderedList = getFiltered();
  document.getElementById('list-count').textContent = `${renderedList.length} asset${renderedList.length !== 1 ? 's' : ''}`;
  const c = document.getElementById('asset-list');
  if (!renderedList.length) {
    const isFiltering = activeFilter !== 'all' || searchTerm;
    if (assets.length === 0 || !isFiltering) {
      c.innerHTML = '<div class="empty-state" role="status"><div class="icon" aria-hidden="true">🏛️</div><p>No assets to display.</p></div>';
    } else {
      c.innerHTML = '<div class="empty-state" role="status"><div class="icon" aria-hidden="true">🔍</div><p>No assets match your search.<br>Try a different filter or search term.</p></div>';
    }
    return;
  }
  c.innerHTML = renderedList.map(renderCard).join('');
}

function renderCard(a) {
  const ll = a.lifeline ? LIFELINES[a.lifeline] : null;
  const color = ll ? ll.color : '#666';
  const label = ll ? ll.label : (a.lifelineRaw || 'Other');
  const iconImg = iconHTML(a.lifeline, 38);
  const dist  = a.distance !== null ? `<span class="dist-pill">📍 ${a.distance.toFixed(1)} mi</span>` : '';
  const cityLine = [a.address, [a.city, a.state].filter(Boolean).join(', ') + (a.zip ? ` ${a.zip}` : ''), a.county ? `(${a.county} Co.)` : ''].filter(Boolean).join(' · ');
  const badges = [
    a.sector ? `<span class="meta-badge sector">${escapeHtml(a.sector)}</span>` : '',
  ].filter(Boolean).join('');
  const sidAttr = String(a.id).replace(/"/g, '&quot;');
  return `<article class="asset-card ${String(selectedId) === String(a.id) ? 'selected' : ''}" id="card-${a.id}"
    data-asset-id="${sidAttr}" role="listitem" tabindex="0"
    aria-label="${escapeHtml(a.name)}, ${escapeHtml(label)}, ${escapeHtml(a.city)}${a.distance !== null ? ' — ' + a.distance.toFixed(1) + ' miles away' : ''}">
    <div class="card-body">
      <div class="card-strip" style="background:${color}"></div>
      <div class="card-content">
        <div class="card-top">
          <div class="type-icon">${iconImg}</div>
          <div class="card-titles">
            <div class="card-name-row">
              <div class="card-name">${escapeHtml(a.name)}</div>
              ${dist}
            </div>
            <div class="card-type-label" style="color:${color}">${escapeHtml(label)}</div>
            ${a.assetType ? `<div class="card-asset-type">${escapeHtml(a.assetType)}</div>` : ''}
          </div>
        </div>
        ${cityLine ? `<div class="card-address">${escapeHtml(cityLine)}</div>` : ''}
        ${badges ? `<div class="meta-badges">${badges}</div>` : ''}
      </div>
    </div>
    <div class="card-footer">
      <button class="card-action primary" data-action="details" data-asset-id="${sidAttr}" aria-label="View details for ${escapeHtml(a.name)}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        Details
      </button>
      <button class="card-action" data-action="directions" data-asset-id="${sidAttr}" aria-label="Get directions to ${escapeHtml(a.name)}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        Directions
      </button>
    </div>
  </article>`;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ── Delegated card handlers (one listener, survives re-renders) ─
function bindListHandlers() {
  const list = document.getElementById('asset-list');
  if (!list || list._bound) return;
  list._bound = true;
  list.addEventListener('click', (e) => {
    const btn = e.target.closest('.card-action[data-asset-id]');
    if (btn) {
      e.stopPropagation();
      const id = btn.getAttribute('data-asset-id');
      if (btn.getAttribute('data-action') === 'directions') openDirections(id);
      else                                                  openDetail(id);
      return;
    }
    const card = e.target.closest('.asset-card[data-asset-id]');
    if (card) selectAsset(card.getAttribute('data-asset-id'));
  });
  list.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('.asset-card[data-asset-id]');
    if (!card || e.target !== card) return;
    e.preventDefault();
    selectAsset(card.getAttribute('data-asset-id'));
  });
}

function openDirections(id) {
  const a = getAsset(id); if (!a) return;
  const fullAddr = `${a.address}, ${a.city}, ${a.state} ${a.zip}`.trim().replace(/,\s*$/, '');
  const url = `https://maps.google.com/?q=${encodeURIComponent(fullAddr || `${a.lat},${a.lng}`)}`;
  window.open(url, '_blank', 'noopener');
}

// ════════════════════════════════════════════════════════════════
//  MAP
// ════════════════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.85, -86.4], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.control.attribution({ position: 'bottomleft', prefix: '© OpenStreetMap © CARTO' }).addTo(map);
}

function refreshMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  assets.forEach(a => {
    const ll = a.lifeline ? LIFELINES[a.lifeline] : null;
    const color = ll ? ll.color : '#666';
    const label = ll ? ll.label : (a.lifelineRaw || 'Other');
    const popIcon = iconHTML(a.lifeline, 28);
    const mk = L.marker([a.lat, a.lng], { icon: makeIcon(a) }).addTo(map)
      .bindPopup(
        `<div class="pop">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <div style="flex-shrink:0">${popIcon}</div>
            <div class="pop-name">${escapeHtml(a.name)}</div>
          </div>
          <div class="pop-type" style="color:${color}">${escapeHtml(label)}</div>
          ${a.assetType ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">${escapeHtml(a.assetType)}</div>` : ''}
        </div>`,
        { closeButton: false, offset: [0, -4] })
      .on('click', () => selectAsset(a.id));
    markers[String(a.id)] = mk;
  });
}

function makeIcon(a, sel = false) {
  const ll = a.lifeline ? LIFELINES[a.lifeline] : null;
  const color = ll ? ll.color : '#666';
  const sz = sel ? 40 : 30;
  // FEMA icons come with their own navy-blue circle, so the marker is just
  // the image. Selection state adds a colored ring (lifeline color) and a
  // larger drop-shadow so the active asset still pops on a busy map.
  const ring = sel
    ? `box-shadow:0 0 0 3px ${color}, 0 3px 12px rgba(0,0,0,0.35)`
    : `box-shadow:0 2px 6px rgba(0,0,0,0.3)`;
  return L.divIcon({
    className: '',
    html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;${ring};overflow:hidden;background:#fff">${iconHTML(a.lifeline, sz)}</div>`,
    iconSize:   [sz, sz],
    iconAnchor: [sz / 2, sz / 2],
  });
}

function selectAsset(id) {
  const a = getAsset(id); if (!a) return;
  if (selectedId && markers[String(selectedId)]) {
    const o = getAsset(selectedId);
    if (o) markers[String(selectedId)].setIcon(makeIcon(o, false));
  }
  selectedId = a.id;
  const mk = markers[String(a.id)];
  if (mk) { mk.setIcon(makeIcon(a, true)); mk.openPopup(); }
  map.flyTo([a.lat, a.lng], 14, { duration: 0.9 });
  document.querySelectorAll('.asset-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('card-' + a.id);
  if (card) { card.classList.add('selected'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

// ════════════════════════════════════════════════════════════════
//  GEOLOCATION
// ════════════════════════════════════════════════════════════════
function requestLocation() {
  if (!navigator.geolocation) return;
  document.getElementById('loc-label').textContent = '…';
  navigator.geolocation.getCurrentPosition(onLocationSuccess, () => {
    document.getElementById('loc-label').textContent = 'Locate';
    alert('Could not get your location. Please enable location access.');
  }, { timeout: 10000, enableHighAccuracy: true });
}

function recenterOnUser() {
  if (userLat === null || userLng === null) { requestLocation(); return; }
  map.flyTo([userLat, userLng], Math.max(map.getZoom(), 12), { duration: 0.8 });
}

function onLocationSuccess(pos) {
  userLat = pos.coords.latitude; userLng = pos.coords.longitude;
  document.getElementById('loc-label').textContent = 'Located ✓';
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.marker([userLat, userLng], {
    icon: L.divIcon({ className: '', html: '<div class="user-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
    zIndexOffset: 1000,
  }).addTo(map);
  map.flyTo([userLat, userLng], 10, { duration: 1 });
  assets = assets.map(a => ({ ...a, distance: haversine(userLat, userLng, a.lat, a.lng) }));
  renderList();
}

function haversine(la1, lo1, la2, lo2) {
  const R = 3958.8, dL = r(la2 - la1), dO = r(lo2 - lo1);
  const A = Math.sin(dL / 2) ** 2 + Math.cos(r(la1)) * Math.cos(r(la2)) * Math.sin(dO / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(A), Math.sqrt(1 - A));
}
function r(d) { return d * Math.PI / 180; }

// ════════════════════════════════════════════════════════════════
//  DETAIL SHEET
// ════════════════════════════════════════════════════════════════
let _lastFocusBeforeDetail = null;

async function openDetail(id) {
  const a = getAsset(id); if (!a) return;
  _lastFocusBeforeDetail = document.activeElement;
  selectAsset(id);
  const ll = a.lifeline ? LIFELINES[a.lifeline] : null;
  const color = ll ? ll.color : '#666';
  const label = ll ? ll.label : (a.lifelineRaw || 'Other');
  const bannerIcon = iconHTML(a.lifeline, 42);
  const desc  = ll ? ll.desc  : '';
  const fullAddr = `${a.address}, ${a.city}, ${a.state} ${a.zip}`.trim().replace(/,\s*$/, '');
  const addrEnc  = encodeURIComponent(fullAddr || `${a.lat},${a.lng}`);
  const distLine = a.distance !== null ? `<div class="sheet-dist">📍 ${a.distance.toFixed(1)} mi away</div>` : '';

  const kvRows = [
    a.assetType   ? ['Asset Type',   a.assetType]   : null,
    a.sector      ? ['CISA Sector',  a.sector]      : null,
    a.component   ? ['Component',    a.component]   : null,
    a.subcomp     ? ['Subcomponent', a.subcomp]     : null,
    a.county      ? ['County',       a.county]      : null,
    a.hsipId      ? ['HSIP ID',      a.hsipId]      : null,
  ].filter(Boolean);
  const detailsSec = kvRows.length ? `
    <div class="sdiv"></div>
    <div class="sec">
      <div class="sec-label">Details</div>
      <div class="kv-grid">
        ${kvRows.map(([k, v]) => `<div class="kv-key">${escapeHtml(k)}</div><div class="kv-val">${escapeHtml(v)}</div>`).join('')}
      </div>
    </div>` : '';

  // Contact section — phone/email are rendered as tap-to-call / tap-to-mail
  // links so a field user can reach the asset's contact directly from the
  // detail sheet without copy-pasting. Phone is sanitized to digits-only
  // for the tel: URI to avoid issues with formatted strings like
  // "(615) 555-1234 ext. 5".
  const phoneDigits = (a.contactPhone || '').replace(/[^\d+]/g, '');
  const contactRows = [
    a.contactName   ? ['Contact', `<div class="kv-val">${escapeHtml(a.contactName)}</div>`] : null,
    a.contactAgency ? ['Agency',  `<div class="kv-val">${escapeHtml(a.contactAgency)}</div>`] : null,
    a.contactPhone  ? ['Phone',   `<a class="kv-val kv-link" href="tel:${escapeHtml(phoneDigits)}">${escapeHtml(a.contactPhone)}</a>`] : null,
    a.contactEmail  ? ['Email',   `<a class="kv-val kv-link" href="mailto:${escapeHtml(a.contactEmail)}">${escapeHtml(a.contactEmail)}</a>`] : null,
  ].filter(Boolean);
  const contactSec = contactRows.length ? `
    <div class="sdiv"></div>
    <div class="sec">
      <div class="sec-label">Contact</div>
      <div class="kv-grid">
        ${contactRows.map(([k, v]) => `<div class="kv-key">${escapeHtml(k)}</div>${v}`).join('')}
      </div>
    </div>` : '';

  document.getElementById('detail-body').innerHTML = `
    <div class="sheet-banner" style="background:${color}18;border:1px solid ${color}40;color:${color};">
      ${bannerIcon}
      <div>
        <div class="banner-label" style="color:${color}">${escapeHtml(label)}</div>
        ${desc ? `<div class="banner-desc" style="color:${color}">${escapeHtml(desc)}</div>` : ''}
      </div>
    </div>
    <div class="sheet-header">
      <h2 class="sheet-name" id="detail-asset-name">${escapeHtml(a.name)}</h2>
      <div class="sheet-addr">${escapeHtml(a.address || '')}${a.address ? '<br>' : ''}${escapeHtml(a.city || '')}${a.city && a.state ? ', ' : ''}${escapeHtml(a.state || '')} ${escapeHtml(String(a.zip || ''))}${a.county ? ' — ' + escapeHtml(a.county) + ' County' : ''}</div>
      ${distLine}
    </div>
    ${detailsSec}
    ${contactSec}
    <div class="sdiv"></div>
    <div class="sec" id="attachments-sec">
      <div class="sec-label">Attachments</div>
      <div id="attachments-body" style="font-size:13px;color:var(--text3)">Loading…</div>
    </div>
    <div class="sdiv"></div>
    <div class="nav-btns">
      <a class="nav-btn goo" href="https://maps.google.com/?q=${addrEnc}" target="_blank" rel="noopener" aria-label="Open in Google Maps">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Google Maps
      </a>
      <a class="nav-btn apl" href="https://maps.apple.com/?q=${addrEnc}" target="_blank" rel="noopener" aria-label="Open in Apple Maps">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Apple Maps
      </a>
    </div>`;
  const sheet = document.getElementById('detail-sheet');
  sheet.removeAttribute('hidden');
  sheet.classList.add('open');
  setTimeout(() => { const btn = sheet.querySelector('.sheet-close-btn'); if (btn) btn.focus(); }, 50);
  sheet._keyHandler = e => {
    if (e.key === 'Escape') { closeDetail(); return; }
    if (e.key !== 'Tab') return;
    const focusables = sheet.querySelectorAll('a[href], button, input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (!focusables.length) return;
    const first = focusables[0], last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  };
  document.addEventListener('keydown', sheet._keyHandler);

  // Lazy-load attachments — only fetched when the detail is opened, not on
  // the initial list query (saves bandwidth on big asset sets).
  loadAttachmentsInto(a);
}

async function loadAttachmentsInto(a) {
  const box = document.getElementById('attachments-body');
  const sec = document.getElementById('attachments-sec');
  if (!box) return;
  const result = await fetchAttachmentInfo(a.objectId);
  // If the layer doesn't have attachments enabled at all, hide the whole
  // section — no point telling users about a feature the data doesn't have.
  if (result.state === 'unsupported') {
    if (sec) sec.style.display = 'none';
    return;
  }
  if (sec) sec.style.display = '';
  if (result.state === 'error') {
    box.innerHTML = `<div style="color:#842029;font-size:13px">${escapeHtml(result.message)}</div>`;
    return;
  }
  const infos = result.infos;
  if (!infos.length) {
    box.innerHTML = '<div style="color:var(--text3);font-size:13px">No attachments for this asset.</div>';
    return;
  }
  box.innerHTML = `<div class="attachment-grid">${infos.map((att, i) => `
    <div class="attachment-tile ${att.isImage ? 'loading' : ''}" data-idx="${i}" data-url="${escapeHtml(att.url)}" data-name="${escapeHtml(att.name)}" data-type="${escapeHtml(att.contentType)}" tabindex="0" role="button" aria-label="${escapeHtml(att.name)}">
      ${att.isImage ? `<img src="${escapeHtml(att.url)}" alt="${escapeHtml(att.name)}" onload="this.parentElement.classList.remove('loading')" onerror="this.parentElement.innerHTML='<div class=\\'fileinfo\\'>📄<br><strong>'+this.alt+'</strong></div>';this.parentElement.classList.remove('loading')">` : `<div class="fileinfo">📄<br><strong>${escapeHtml(att.name)}</strong><br>${formatBytes(att.size)}</div>`}
    </div>`).join('')}</div>`;
  box.querySelectorAll('.attachment-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const url = tile.getAttribute('data-url');
      const type = tile.getAttribute('data-type');
      if (type && type.startsWith('image/')) openLightbox(url, tile.getAttribute('data-name'));
      else                                    window.open(url, '_blank', 'noopener');
    });
    tile.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); tile.click(); }
    });
  });
}

function formatBytes(n) {
  if (!n) return '';
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(0)} KB`;
  return `${(n / 1024 / 1024).toFixed(1)} MB`;
}

function closeDetail() {
  const sheet = document.getElementById('detail-sheet');
  sheet.classList.remove('open');
  setTimeout(() => sheet.setAttribute('hidden', ''), 350);
  document.removeEventListener('keydown', sheet._keyHandler);
  if (_lastFocusBeforeDetail) _lastFocusBeforeDetail.focus();
}

// ── Lightbox ───────────────────────────────────────────────────
function openLightbox(url, name) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = url; img.alt = name || '';
  lb.hidden = false;
  document.addEventListener('keydown', _lightboxKey);
}
function closeLightbox() {
  document.getElementById('lightbox').hidden = true;
  document.getElementById('lightbox-img').src = '';
  document.removeEventListener('keydown', _lightboxKey);
}
function _lightboxKey(e) { if (e.key === 'Escape') closeLightbox(); }

// ════════════════════════════════════════════════════════════════
//  STARTUP
// ════════════════════════════════════════════════════════════════
async function startApp() {
  buildFilterGrid();
  bindListHandlers();
  initMap();
  await fetchAssets();
  // Discover layer capabilities (hasAttachments, etc.) — runs in parallel
  // with everything else; the result is consulted when a detail is opened.
  fetchLayerMeta();
  if (navigator.geolocation) navigator.geolocation.getCurrentPosition(onLocationSuccess, () => {}, { timeout: 5000 });
  if (CONFIG.refreshInterval > 0) {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(fetchAssets, CONFIG.refreshInterval);
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  // Step 1 — if we just got back from the OAuth redirect, exchange the code
  const consumed = await handleOAuthCallback();
  if (consumed) {
    hideLogin();
    startApp();
    return;
  }
  // Step 2 — otherwise, look for a cached token from a previous session
  const stored = loadStoredToken();
  if (stored && stored.accessToken) {
    TOKEN = stored;
    // If the access token is past expiry, try a silent refresh first
    try {
      if (Date.now() > stored.expiresAt - CONFIG.refreshBufferMs) {
        await ensureFreshToken();
      }
      hideLogin();
      startApp();
    } catch (err) {
      console.warn('Silent refresh on startup failed:', err);
      clearStoredToken();
      showLogin();
    }
  } else {
    showLogin();
  }
});

window.addEventListener('load', () => { setTimeout(() => { if (map) map.invalidateSize(); }, 300); });
window.addEventListener('resize', () => { if (map) map.invalidateSize(); });
</script>
